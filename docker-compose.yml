services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: arena-book-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - arena_book_sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b -o /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: arena-book-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-arena}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-change_me_strong}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 8

  api:
    build:
      context: .
      dockerfile: backend/ArenaBook.Api/Dockerfile
    container_name: arena-book-api
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=${SQLSERVER_DATABASE:-ArenaBook};User Id=sa;Password=${SQLSERVER_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;MultipleActiveResultSets=true
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: ${RABBITMQ_USER:-arena}
      RabbitMQ__Password: ${RABBITMQ_PASS:-change_me_strong}
      RabbitMQ__VirtualHost: ${RABBITMQ_VHOST:-/}
      Seed__UsersPassword: ${SEED_USERS_PASSWORD:-}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-admin@arena.local}
      Seed__RunDemoDataOnStartup: ${SEED_RUN_DEMO_DATA_ON_STARTUP:-true}
      Jwt__Issuer: ${JWT_ISSUER:-ArenaBook}
      Jwt__Audience: ${JWT_AUDIENCE:-ArenaBookClients}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-120}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      Stripe__PublishableKey: ${STRIPE_PUBLISHABLE_KEY:-}
      PayPal__ClientId: ${PAYPAL_CLIENT_ID:-}
      PayPal__ClientSecret: ${PAYPAL_CLIENT_SECRET:-}
      PayPal__BaseApiUrl: ${PAYPAL_BASE_API_URL:-https://api-m.sandbox.paypal.com}
      PayPal__WebhookId: ${PAYPAL_WEBHOOK_ID:-}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__UserName: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-noreply@arenabook.local}
      Smtp__FromDisplayName: ${SMTP_FROM_NAME:-ArenaBook}
      Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/ArenaBook.Worker/Dockerfile
    container_name: arena-book-worker
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=${SQLSERVER_DATABASE:-ArenaBook};User Id=sa;Password=${SQLSERVER_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;MultipleActiveResultSets=true
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: ${RABBITMQ_USER:-arena}
      RabbitMQ__Password: ${RABBITMQ_PASS:-change_me_strong}
      RabbitMQ__VirtualHost: ${RABBITMQ_VHOST:-/}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__UserName: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-noreply@arenabook.local}
      Smtp__FromDisplayName: ${SMTP_FROM_NAME:-ArenaBook}
      Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  arena_book_sqldata:
